[build]
  publish = "."
  edge_functions = "netlify/edge-functions"

[[edge_functions]]
  function = "google-fetch-auth"
  path = "/fetch/*"

[[headers]]
  for = "/fetch/*"

  [headers.values]
    Cache-Control = "no-store, no-cache, max-age=0, must-revalidate"
    Expires = "0"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/assets/your-constitution-claude-press-release.pdf"

  [headers.values]
    X-Robots-Tag = "noindex"
